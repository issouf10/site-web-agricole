<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - AgriConnect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <h1>AgriConnect</h1>
        <ul class="nav-links"><li><a href="index.html">Accueil</a></li></ul>
    </nav>

    <div class="auth-container" style="display:flex; justify-content:center; align-items:center; min-height:80vh;">
        <form class="login-form" action="login_process.php" method="POST">
            <h2>Connexion</h2>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Votre email" required>
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" name="password" placeholder="Votre mot de passe" required>
            </div>
            <button type="submit" class="btn-submit">
                Se connecter
            </button>
            <p style="text-align:center;">Pas encore de compte ? <a href="register.html">S'inscrire</a></p>
        </form>
    </div>

    <footer>
        <p>&copy; 2026 AgroConnect - Plateforme d'échange agricole.</p>
    </footer>
