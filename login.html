<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - AgriConnect</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Menu -->
    <nav class="navbar">
        <h1 class="logo">🌱 AgriConnect</h1>

        <ul class="nav-links">
            <li><a href="index.html">Accueil</a></li>
            <li><a href="features.html">Fonctionnalités</a></li>
            <li><a href="login.html">Connexion</a></li>
            <li><a href="register.html">Inscription</a></li>
        </ul>
    </nav>

    <!-- Formulaire -->
    <section class="auth-section">

        <div class="auth-box">
            <h2>Connexion</h2>
            <p>Connectez-vous pour accéder à votre espace.</p>

            <form>
                <input type="email"
                       placeholder="Votre email"
                       required>

                <input type="password"
                       placeholder="Votre mot de passe"
                       required>

                <button type="submit">
                    Se connecter
                </button>
            </form>

            <div style="margin-top: 20px;">
                <p>Vous n'avez pas de compte ?</p>
                <a href="register.html" style="text-decoration: none;">
                    <button type="button" style="background: #ffa000;">Créer un compte</button>
                </a>
            </div>
        </div>
    </section>
    
    <script src="script.js"></script>
</body>
</html>
