<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - AgroConnect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">Agro<span>Connect</span></div>
        <ul class="nav-links"><li><a href="index.html">Retour à l'accueil</a></li></ul>
    </nav>

    <div class="form-page">
        <form class="auth-form" id="registerForm">
            <h2>Créer un compte</h2>
            <div class="form-group">
                <label>Nom et Prénom</label>
                <input type="text" placeholder="Votre nom" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="email@exemple.com" required>
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <div class="password-wrapper">
                    <input type="password" id="reg-pass" placeholder="8 caractères minimum" required>
                    <button type="button" class="toggle-password" data-target="reg-pass">Voir</button>
                </div>
            </div>
            <button type="submit" class="btn-full">S'inscrire</button>
            <p class="switch-form">Déjà un compte ? <a href="login.html">Connectez-vous</a></p>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
