<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - AgroConnect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="form-page">
    <nav class="navbar">
        <div class="logo">Agro<span>Connect</span></div>
        <ul class="nav-links"><li><a href="index.html">Retour à l'accueil</a></li></ul>
    </nav>

    <div class="auth-form">
        <h1>S'inscrire</h1>
        <p>Remplissez les informations ci-dessous pour créer votre compte.</p>

        <form action="/api/auth/register" method="post">
            <div class="form-group">
                <label for="nom">Nom</label>
                <input type="text" id="nom" name="nom" placeholder="Votre nom" required>
            </div>

            <div class="form-group">
                <label for="prenom">Prénom</label>
                <input type="text" id="prenom" name="prenom" placeholder="Votre prénom" required>
            </div>

            <div class="form-group">
                <label for="email">Gmail / Email</label>
                <input type="email" id="email" name="email" placeholder="exemple@gmail.com" required>
            </div>

            <div class="form-group">
                <label for="password">Mot de passe</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" placeholder="Votre mot de passe" required>
                </div>
            </div>

            <button type="submit" class="btn-submit">S'inscrire</button>
        </form>

        <p class="switch-form">Déjà inscrit ? <a href="login.html">Connectez-vous ici</a></p>
    </div>

    <footer>
        <p>&copy; 2026 AgroConnect - Plateforme d'échange agricole</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
