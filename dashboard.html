<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Espace - AgroConnect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="form-page">
    <nav class="navbar">
        <div class="logo">Agro<span>Connect</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Voir le Marché</a></li>
            <li><a href="#" id="logoutBtn" class="btn-login">Déconnexion</a></li>
        </ul>
    </nav>

    <main class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h1>Mes Produits</h1>
            <button class="btn-add" onclick="alert('Fonctionnalité bientôt disponible !')">+ Ajouter un produit</button>
        </div>

        <div class="product-grid">
            <div class="product-card">
                <div class="product-image">
                    <img src="https://images.unsplash.com/photo-1598170845058-32b9d6a5da37?q=80&w=400" alt="Carottes">
                </div>
                <div class="product-info">
                    <h3>Vos Carottes</h3>
                    <p>Quantité restante : 50kg</p>
                    <p class="price">800 FCFA / kg</p>
                    <div style="display: flex; gap: 10px; margin-top: 15px;">
                        <button class="btn-modify">Modifier</button>
                        <button class="btn-delete">Supprimer</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
